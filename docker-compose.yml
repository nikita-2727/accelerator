services:
  postgres:
    image: postgres:16-alpine # ставим легковесный образ бд
    container_name: accelerator-postgres
    environment: # задаем переменные среды, образ сам создаст пользователя с таким паролем и создаст бд с таким именем
      POSTGRES_USER: "${POSTGRES_USER}" 
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    ports: # пробрасываем порт из контейнера на локальную машину, чтобы можно было подключиться вне контейнера
      - "5432:5432"
    volumes: # сохраняем данные с бд из контейнера в папку на локальной машине, чтобы не стирались при перезагрузке контейнера
      - postgres_data:/var/lib/postgresql/data
    healthcheck: # проверка, работает ли база данных каждые n секунд
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: # подключаем к созданной локальной сети, чтобы контейнеры могли общаться между собой 
      - accelerator-network

  minio:
    image: minio/minio:latest
    container_name: accelerator-minio
    command: server /data --console-address ":9001"
    environment: # образ сам создаст пользователя с таким паролем
      MINIO_ROOT_USER: "${S3_ACCESS_KEY_ID}"
      MINIO_ROOT_PASSWORD: "${S3_SECRET_ACCESS_KEY}"
    ports: # 9000 - порт самого клиента minio, 9001 - веб-консоль небольшой графический интерфейс
      - "9000:9000"
      - "9001:9001"
    volumes: # также прокидываем общую папку, чтобы данные не удалялись
      - minio_data:/data
    networks:
      - accelerator-network

  migrate:
    image: migrate/migrate:v4.17.0
    container_name: accelerator-migrate
    volumes:
      - ./migrations:/migrations # монтируем папку с миграциями внутрь докер контейнера
    command: ["-path", "/migrations", "-database", "${DB_DSN}", "up"] # сразу накатываем все миграции при запуске приложения
    depends_on: # ставиим зависимость, что выполнять миграции можно только если бд работает нормально
      postgres:
        condition: service_healthy
    networks:
      - accelerator-network

  app:
    build: . # берем образ из докер файла
    container_name: accelerator-go   
    environment: # так как мы не кидаем туда .env, нам нужно предоставить доступ к переменным из него
      SERVER_PORT: "${SERVER_PORT}"
      DB_DSN: "${DB_DSN}"
      JWT_ACCESS_SECRET: "${JWT_ACCESS_SECRET}"
      JWT_REFRESH_SECRET: "${JWT_REFRESH_SECRET}"
      ACCESS_TIME_MINUTE: "${ACCESS_TIME_MINUTE}"
      REFRESH_TIME_HOURS: "${REFRESH_TIME_HOURS}"
      SIZE_LIMIT_AUDIO_MB: "${SIZE_LIMIT_AUDIO_MB}"

      S3_ENDPOINT: "${S3_ENDPOINT}"
      S3_ACCESS_KEY_ID: "${S3_ACCESS_KEY_ID}"
      S3_SECRET_ACCESS_KEY: "${S3_SECRET_ACCESS_KEY}"
    volumes: # пробрасываем папку с логами напрямую в докер контейнер 
      - ./logs:/root/logs
    ports:
      - "8000:8000"
    depends_on:
      migrate: # ждем пока миграции успешно применятся и запустится объектное хранилище
        condition: service_completed_successfully
      minio:
        condition: service_started
    networks:
      - accelerator-network

volumes: # используем именованные тома, а не привязка к конкретной папке
  postgres_data:
  minio_data:

networks:
  accelerator-network:
    driver: bridge